# Blueprint Render — Clinix (web Node + Postgres grátis)
# Deploy: https://dashboard.render.com → New → Blueprint → aponte para este repo.
# As 3 variáveis com `sync: false` (Twilio) você preenche no painel após o 1º deploy.

databases:
  - name: clinix-db
    plan: free
    databaseName: clinix
    user: clinix

services:
  - type: web
    name: clinix
    runtime: node
    plan: free
    region: oregon
    # --include=dev garante prisma CLI + typescript mesmo com NODE_ENV=production.
    # O postinstall (prisma generate) roda dentro do npm ci.
    buildCommand: npm ci --include=dev && npm run build
    # migrate deploy é idempotente: aplica o schema no Postgres a cada boot.
    startCommand: npx prisma migrate deploy && node dist/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clinix-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Render gera um segredo forte automaticamente
      - key: DEFAULT_TIMEZONE
        value: America/Sao_Paulo
      - key: REMINDER_HOUR
        value: "18"
      - key: LOG_LEVEL
        value: info
      # ─── Acesso ao sistema (login do site) — DEFINIR no painel ───
      # Sem isso o login cai no default fraco (admin/clinix2024). Troque!
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # ─── Twilio: preencher no painel (Environment) ───
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      # URL pública do webhook (valida assinatura do Twilio). Após o 1º deploy,
      # preencha com: https://SEU-APP.onrender.com/webhooks/twilio
      - key: TWILIO_WEBHOOK_URL
        sync: false
      # ─── IA opcional (Gemini): preencher se for usar ───
      - key: GEMINI_API_KEY
        sync: false
