# fly.toml — Clinix no Fly.io (usa o Dockerfile do repo)
# Setup inicial:
#   fly launch --no-deploy --copy-config   # reaproveita este arquivo
#   fly postgres create                    # cria o Postgres gerenciado
#   fly postgres attach <nome-do-pg>       # seta DATABASE_URL como secret
#   fly secrets set TWILIO_ACCOUNT_SID=... TWILIO_AUTH_TOKEN=... \
#                  TWILIO_FROM_NUMBER='whatsapp:+14155238886' \
#                  JWT_SECRET="$(openssl rand -hex 32)"
#   fly deploy

app = "clinix"
primary_region = "gru"  # São Paulo (mais perto do fuso/Twilio BR)

[build]
  dockerfile = "Dockerfile"

# Aplica as migrations Prisma numa VM temporária antes de publicar a versão.
[deploy]
  release_command = "npx prisma migrate deploy"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DEFAULT_TIMEZONE = "America/Sao_Paulo"
  REMINDER_HOUR = "18"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"   # hiberna sem tráfego (economiza no free)
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
