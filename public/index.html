<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClinicBot Pro</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a1120; color: #e2e8f0;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .container { text-align: center; padding: 40px 20px; }
  .logo {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, #4f46e5, #06b6d4);
    border-radius: 24px; display: flex; align-items: center; justify-content: center;
    font-size: 40px; margin: 0 auto 20px;
  }
  h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  p { color: #64748b; margin-bottom: 32px; }
  .links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  a {
    padding: 12px 24px; border-radius: 12px; font-weight: 600; font-size: 14px;
    text-decoration: none; transition: all .2s; display: flex; align-items: center; gap: 8px;
  }
  .btn-admin { background: #4f46e5; color: #fff; }
  .btn-admin:hover { background: #4338ca; transform: translateY(-2px); }
  .btn-demo { background: rgba(37,211,102,.15); color: #25d366; border: 1px solid rgba(37,211,102,.3); }
  .btn-demo:hover { background: rgba(37,211,102,.25); transform: translateY(-2px); }
  .badge { font-size: 11px; background: rgba(255,255,255,.15); padding: 2px 8px; border-radius: 10px; }
</style>
</head>
<body>
  <div class="container">
    <div class="logo">🏥</div>
    <h1>ClinicBot Pro</h1>
    <p>Sistema de agendamento inteligente via WhatsApp para clínicas</p>
    <div class="links">
      <a href="/admin" class="btn-admin">📊 Painel Admin <span class="badge">Dashboard</span></a>
      <a href="/demo" class="btn-demo">💬 Demo WhatsApp <span class="badge">Teste</span></a>
    </div>
  </div>
</body>
</html>
